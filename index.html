<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>撮影管理アプリ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<datalist id="costume-datalist"></datalist>
<datalist id="prop-datalist"></datalist>

<div id="app">
  <div class="header">
    <div class="header-left">
      <img src="Qbrick_icon.png" class="header-logo" alt="ロゴ">
      <div>
        <div class="breadcrumb">
          <span class="breadcrumb-link" onclick="goHome()">ホーム</span>
          <span id="header-movie-title-nav" class="hidden breadcrumb-link" onclick="scrollToTop()"> ＞ <span id="header-title-sub">映画タイトル</span></span>
        </div>
        <span id="header-main-title" style="font-size: 18px;">製作映画一覧</span>
      </div>
    </div>
    <div class="header-right">
      <button class="icon-btn hidden" id="header-search-btn" onclick="goSearch()">検索</button>
      <button class="icon-btn" onclick="toggleDarkMode()" id="dark-mode-btn">ダークモード</button>
    </div>
  </div>

  <div id="view-home" class="container">
    <h3 class="section-title">登録済みの映画一覧</h3>
    <div id="movie-list"></div>

    <div class="card card-no-click" style="margin-top: 24px;">
      <h3>新しい映画を登録</h3>
      <input type="text" id="new-movie-title" placeholder="映画のタイトルを手入力">
      <button onclick="addMovie()">追加する</button>
      
      <h4 style="margin-top: 24px; color: var(--accent-color);">Excelから読み込む</h4>
      <input type="file" id="excel-upload" accept=".xlsx, .xls" onchange="handleExcelUpload(event)">
    </div>

    <div class="card card-no-click" style="margin-top: 24px;">
      <h3 style="color: #1976d2;">参加中の撮影スケジュール</h3>
      <div id="global-calendar"></div>
    </div>
  </div>

  <div id="view-daily" class="container hidden">
    <button class="secondary sticky-back-btn" onclick="goHome()">&lt; カレンダーに戻る</button>
    <h2 id="daily-date-title" style="border-bottom: 3px solid #1976d2; padding-bottom: 8px;">撮影予定</h2>
    <div id="daily-scene-list-container"></div>
  </div>

  <!-- 🌟 新しく作った、検索専用のお部屋です -->
  <div id="view-search" class="container hidden">
    <button class="secondary sticky-back-btn" onclick="goMovie(currentMovieId)">&lt; 映画詳細に戻る</button>
    <h2 class="section-title">シーンの検索</h2>
    
    <div class="card search-panel">
      <div class="search-grid">
        <div>
          <label class="input-label">シーン番号</label>
          <select id="search-number" onchange="renderSearchResults()"><option value="">すべて</option></select>
        </div>
        <div>
          <label class="input-label">場所</label>
          <select id="search-location" onchange="renderSearchResults()"><option value="">すべて</option></select>
        </div>
        <div>
          <label class="input-label">日付</label>
          <select id="search-date" onchange="renderSearchResults()"><option value="">すべて</option></select>
        </div>
        <div>
          <label class="input-label">衣装名</label>
          <select id="search-costume" onchange="renderSearchResults()"><option value="">すべて</option></select>
        </div>
        <div>
          <label class="input-label">物品名</label>
          <select id="search-prop" onchange="renderSearchResults()"><option value="">すべて</option></select>
        </div>
      </div>
      <button class="secondary" style="margin-top: 12px; width: auto;" onclick="clearSearch()">検索条件をクリア</button>
    </div>

    <div id="search-result-list"></div>
  </div>

  <div id="view-movie" class="container hidden">
    <div class="split-layout">
      <div class="list-pane" id="list-pane">
        
        <button class="secondary sticky-back-btn" onclick="goHome()">&lt; 映画一覧に戻る</button>

        <div class="card card-no-click">
          <h3>新しいシーンを追加</h3>
          <input type="number" id="new-scene-number" placeholder="シーン番号 (必須)" oninput="checkSceneInput()">
          
          <details class="accordion" id="new-scene-details">
            <summary>詳細情報を入力する</summary>
            <div class="accordion-content">
              <input type="text" id="new-scene-name" placeholder="シーン名" oninput="checkSceneInput()">
              <input type="text" id="new-scene-location" placeholder="場所" oninput="checkSceneInput()">
              
              <label class="input-label">撮影日（ダイヤル入力）</label>
              <div class="date-dial-container">
                <select id="ns-year" onchange="updateDays('ns'); checkSceneInput();"></select>
                <span>年</span>
                <select id="ns-month" onchange="updateDays('ns'); checkSceneInput();"></select>
                <span>月</span>
                <select id="ns-day" onchange="checkSceneInput();"></select>
                <span>日</span>
              </div>

              <details class="accordion sub-accordion">
                <summary>詳細を追加</summary>
                <div class="accordion-content">
                  <div id="new-costume-list"></div>
                  <button type="button" class="secondary" onclick="addCostumeInput('new-costume-list')">[+] 衣装枠を追加</button>
                </div>
              </details>

              <details class="accordion sub-accordion">
                <summary>詳細を追加</summary>
                <div class="accordion-content">
                  <div id="new-prop-list"></div>
                  <button type="button" class="secondary" onclick="addPropInput('new-prop-list')">[+] 小道具枠を追加</button>
                </div>
              </details>
            </div>
          </details>
          
          <button id="add-scene-btn" disabled onclick="addScene()">シーンを追加</button>
        </div>
        
        <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-top: 32px; margin-bottom: 8px; border-bottom: 2px solid var(--header-bg); padding-bottom: 4px;">
          <h3 style="border: none; margin: 0; padding: 0;">登録データの一覧</h3>
          
          <div class="sort-filter-bar" id="sort-filter-bar">
            <select id="sort-select" onchange="updateSort(this.value)"></select>
          </div>
        </div>
        
        <div class="view-toggles">
          <button id="btn-view-list" class="active" onclick="setViewMode('list')">シーン順</button>
          <button id="btn-view-cos" onclick="setViewMode('cos')">衣装一覧</button>
          <button id="btn-view-prop" onclick="setViewMode('prop')">小道具一覧</button>
        </div>

        <button id="bulk-delete-btn" class="danger hidden" onclick="deleteSelectedScenes()" style="margin-bottom: 16px; margin-top: 0;">[削除] 選択したシーンをすべて削除</button>

        <div id="scene-list"></div>
        <button class="secondary" onclick="goHome()">&lt; 映画一覧に戻る</button>
      </div>

      <div class="detail-pane" id="detail-pane">
        <button class="close-btn" onclick="closeSceneDetail()">[x] 編集を閉じる</button>

        <div class="card card-no-click">
          <h3>シーン基本情報</h3>
          <label class="input-label">シーン番号</label>
          <input type="number" id="edit-scene-number" placeholder="シーン番号">
          <label class="input-label">シーン名</label>
          <input type="text" id="edit-scene-name" placeholder="シーン名">
          <label class="input-label">場所</label>
          <input type="text" id="edit-scene-location" placeholder="場所">
          
          <label class="input-label">撮影日を変更</label>
          <div class="date-dial-container">
            <select id="ed-year" onchange="updateDays('ed');"></select>
            <span>年</span>
            <select id="ed-month" onchange="updateDays('ed');"></select>
            <span>月</span>
            <select id="ed-day"></select>
            <span>日</span>
          </div>
        </div>

        <div class="card card-no-click">
          <h3 style="color: #c2185b;">衣装の登録</h3>
          <div id="edit-costume-list"></div>
          <button type="button" class="secondary" onclick="addCostumeInput('edit-costume-list')">[+] 衣装枠を追加</button>
        </div>

        <div class="card card-no-click">
          <h3 style="color: #1976d2;">小道具の登録</h3>
          <div id="edit-prop-list"></div>
          <button type="button" class="secondary" onclick="addPropInput('edit-prop-list')">[+] 小道具枠を追加</button>
        </div>
        
        <button style="background-color: #2e7d32; border-color: #2e7d32; padding: 16px; font-size: 16px; margin-bottom: 24px;" onclick="saveEditedScene()">[保存] このシーンの変更を保存</button>

        <button class="danger" onclick="deleteScene()">[削除] このシーンだけ削除する</button>
      </div>
    </div>
  </div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
