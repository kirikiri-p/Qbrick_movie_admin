<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Qbrick専用 撮影管理アプリ</title>
<link rel="icon" href="Qbrick_icon.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<link rel="stylesheet" href="style.css?v=4">
</head>
<body>

<div id="app">
  <div class="header">
    <div class="header-left">
      <img src="Qbrick_icon.png" class="header-logo" alt="ロゴ">
      <div>
        <div class="breadcrumb">
          <span class="breadcrumb-link" onclick="goHome()">ホーム</span>
          <span id="header-movie-title-nav" class="hidden breadcrumb-link" onclick="scrollToTop()"> ＞ <span id="header-title-sub">映画タイトル</span></span>
        </div>
        <span id="header-main-title" style="font-size: 18px;">製作映画一覧</span>
      </div>
    </div>
    <div class="header-right">
      <button class="icon-btn hidden" id="header-search-btn" style="color: white !important;" onclick="goSearch()">検索</button>
      <button class="icon-btn" id="dark-mode-btn" 
        style="color: white !important; font-size: 16px;">🌙</button>
    </div>
  </div>

  <div id="view-home" class="container">
    <h3 class="section-title">製作映画一覧</h3>
    <div id="movie-list"></div>

    <div class="card card-no-click editor-only" style="margin-top: 24px;">
      <h3>新しい映画を登録</h3>
      <input type="text" id="new-movie-title" placeholder="映画のタイトルを手入力">
      <button id="btn-add-movie">追加する</button>
      
      <h4 style="margin-top: 24px; color: var(--accent-color);">Excelから読み込む</h4>
      <input type="file" id="excel-upload" accept=".xlsx, .xls">
      <a href="Qbrick_管理テンプレート.xlsx" download class="template-download-link">📥 テンプレートをダウンロード</a>
    </div>

    <div class="card card-no-click" style="margin-top: 24px;">
      <h3 style="color: #1976d2;">参加中の撮影スケジュール</h3>
      <div id="global-calendar"></div>
    </div>

    <div style="text-align: center; margin-top: 40px; margin-bottom: 20px;">
      <button id="editor-toggle-btn" class="secondary" 
        onclick="toggleEditorMode()"
        style="width: auto; font-size: 13px; color: var(--muted-text); border: 1px solid var(--border-color);">
        編集者モードになる
      </button>
    </div>
  </div>

  <div id="view-movie-details" class="container hidden">
    <button class="secondary sticky-back-btn" onclick="goHome()">&lt; 映画一覧に戻る</button>
    <h2 class="section-title">映画の基本情報</h2>
    
    <div class="card card-no-click">
      <label class="input-label">映画タイトル</label>
      <input type="text" id="movie-detail-title">
      
      <label class="input-label">アイコン (絵文字)</label>
      <input type="text" id="movie-detail-icon" placeholder="例: 🎬" maxlength="2">

      <label class="input-label">種類</label>
      <select id="movie-detail-type">
        <option value="">未設定</option>
        <option value="長編">長編</option>
        <option value="中編">中編</option>
        <option value="短編">短編</option>
      </select>

      <label class="input-label">監督</label>
      <input type="text" id="movie-detail-director" placeholder="監督名">

      <label class="input-label">年度</label>
      <input type="number" id="movie-detail-year" placeholder="例: 2026">
      
      <button style="background-color: #2e7d32; border-color: #2e7d32; margin-top: 24px;" id="btn-save-movie-details">更新して一覧に戻る</button>
    </div>

    <button class="danger" id="btn-delete-movie-details">この映画を完全に削除する</button>
  </div>

  <div id="view-daily" class="container hidden">
    <div class="split-layout">
      <div class="list-pane" id="daily-list-pane">
        <button class="secondary sticky-back-btn" onclick="goHome()">&lt; カレンダーに戻る</button>
        <h2 id="daily-date-title" class="section-title" style="color: #1976d2;">撮影予定</h2>
        <div id="daily-scene-list-container"></div>
      </div>
      <div class="detail-pane-container" id="daily-detail-container"></div>
    </div>
  </div>

  <div id="view-search" class="container hidden">
    <div class="split-layout">
      <div class="list-pane" id="search-list-pane">
        <button class="secondary sticky-back-btn" onclick="backFromSearch()">&lt; 映画詳細に戻る</button>
        <h2 class="section-title">シーンの検索</h2>
        
        <div class="card search-panel">
          <div class="search-grid">
            <div><label class="input-label">シーン番号</label><select id="search-number"></select></div>
            <div><label class="input-label">場所</label><select id="search-location"></select></div>
            <div><label class="input-label">日付</label><select id="search-date"></select></div>
            <div><label class="input-label">衣装名</label><select id="search-costume"></select></div>
            <div><label class="input-label">物品名</label><select id="search-prop"></select></div>
          </div>
          <button class="secondary" style="margin-top: 12px; width: auto;" onclick="clearSearch()">条件をクリア</button>
        </div>
        <div id="search-result-list"></div>
      </div>
      <div class="detail-pane-container" id="search-detail-container"></div>
    </div>
  </div>

  <div id="view-movie" class="container hidden">
    <div class="split-layout">
      <div class="list-pane" id="list-pane">
        
        <button class="secondary sticky-back-btn" onclick="goHome()">&lt; 映画一覧に戻る</button>

        <div class="card card-no-click editor-only">
          <h3>新しいシーンを追加</h3>
          <label class="input-label">シーン番号（必須）</label>
          <input type="number" id="new-scene-number" placeholder="例: 13" oninput="checkSceneInput()">
          <label class="input-label">メモ・備考</label>
            <textarea id="new-scene-memo" placeholder="監督からの指示や注意点など"></textarea>
          
          <details class="accordion" id="new-scene-details">
            <summary>詳細情報を入力する</summary>
            <div class="accordion-content">
              <label class="input-label">シーン名</label>
              <input type="text" id="new-scene-name" placeholder="例: オープニング" oninput="checkSceneInput()">
              <label class="input-label">場所</label>
              <input type="text" id="new-scene-location" placeholder="例: 熊本大学北キャンパスくすのきホール" oninput="checkSceneInput()">
              
              <label class="input-label">撮影日</label>
              <div id="new-scene-dates"></div>
              <button type="button" class="secondary" style="margin-top: 4px;" onclick="addDateInput('new-scene-dates')">撮影日を追加</button>
              
              <details class="accordion sub-accordion"><summary>衣装詳細を追加</summary><div class="accordion-content"><div id="new-costume-list"></div><button type="button" class="secondary" onclick="addCostumeInput('new-costume-list')">衣装枠を追加</button></div></details>
              <details class="accordion sub-accordion"><summary>小道具詳細を追加</summary><div class="accordion-content"><div id="new-prop-list"></div><button type="button" class="secondary" onclick="addPropInput('new-prop-list')">小道具枠を追加</button></div></details>
            </div>
          </details>
          <button id="add-scene-btn" disabled onclick="addScene()">追加</button>
        </div>
        
        <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-top: 32px; margin-bottom: 8px; border-bottom: 2px solid var(--header-bg); padding-bottom: 4px;">
          <h3 style="border: none; margin: 0; padding: 0;">登録データの一覧</h3>
          <div class="sort-filter-bar" id="sort-filter-bar"><select id="sort-select" onchange="updateSort(this.value)"></select></div>
        </div>
        
        <div class="view-toggles">
          <button id="btn-view-list" class="active" onclick="setViewMode('list')">シーン順</button>
          <button id="btn-view-cos" onclick="setViewMode('cos')">衣装一覧</button>
          <button id="btn-view-prop" onclick="setViewMode('prop')">小道具一覧</button>
        </div>

        <div style="display: flex; justify-content: flex-start; gap: 8px; margin-bottom: 16px;">
          <button id="bulk-delete-btn" class="danger hidden editor-only" onclick="deleteSelectedScenes()" style="margin-top: 0; width: auto;">選択したシーンをすべて削除</button>
          <button class="secondary editor-only" onclick="exportToExcel()" style="margin-top: 0; width: auto;">[↓] Excelで出力</button>
        </div>

        <div id="scene-list"></div>
        <button class="secondary" onclick="goHome()">&lt; 映画一覧に戻る</button>
      </div>

      <div class="detail-pane-container" id="movie-detail-container">
        
        <div class="detail-pane" id="detail-pane">
          <div id="detail-pane-view">
            <button class="close-btn" onclick="closeSceneDetail()">✕ 閉じる</button>
            <div class="card card-no-click">
              <h3 id="view-scene-header" style="margin-bottom: 4px;"></h3>
              <div id="view-scene-info" class="scene-info" style="margin-bottom: 16px;"></div>
              <div id="view-scene-memo" style="margin-top: 12px;"></div>
              <div id="view-scene-costumes" style="margin-bottom: 12px;"></div>
              <div id="view-scene-props"></div>
            </div>
            <button class="editor-only" onclick="openSceneEdit()">このシーンを編集する</button>
          </div>

          <div id="detail-pane-edit" class="hidden">
            <button class="close-btn" onclick="cancelSceneEdit()">&lt; 編集をキャンセル</button>
            <div class="card card-no-click">
              <h3>シーン基本情報</h3>
              <label class="input-label">シーン番号</label><input type="number" id="edit-scene-number">
              <label class="input-label">シーン名</label><input type="text" id="edit-scene-name">
              <label class="input-label">場所</label><input type="text" id="edit-scene-location">
              <label class="input-label">メモ・備考</label><textarea id="edit-scene-memo" placeholder="メモを入力"></textarea>
              
              <label class="input-label">撮影日を変更</label>
              <div id="edit-scene-dates"></div>
              <button type="button" class="secondary" style="margin-top: 4px;" onclick="addDateInput('edit-scene-dates')">撮影日を追加</button>
            </div>

            <div class="card card-no-click">
              <h3 style="color: #c2185b;">衣装の登録</h3>
              <div id="edit-costume-list"></div>
              <button type="button" class="secondary" onclick="addCostumeInput('edit-costume-list')">衣装枠を追加</button>
            </div>

            <div class="card card-no-click">
              <h3 style="color: #1976d2;">小道具の登録</h3>
              <div id="edit-prop-list"></div>
              <button type="button" class="secondary" onclick="addPropInput('edit-prop-list')">小道具枠を追加</button>
            </div>
            
            <button style="background-color: #2e7d32; border-color: #2e7d32; padding: 16px; font-size: 16px; margin-bottom: 24px;" onclick="saveEditedScene()">このシーンの変更を保存</button>
            <button class="danger" onclick="deleteScene()">このシーンだけ削除する</button>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<script type="module" src="script.js?v=4"></script>
</body>
</html>
